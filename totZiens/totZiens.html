<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>See You Soon - Blind Monkey</title>

  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Public Sans', sans-serif;
      background: #0d0a06;
      overflow-x: hidden;
    }

    /* ── Background ── */
    .goodbye-container {
      min-height: 100vh;
      background: #0d0a06;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    /* Glow rojo fondo */
    .goodbye-container::before {
      content: '';
      position: absolute;
      width: 80vw;
      height: 80vw;
      max-width: 700px;
      max-height: 700px;
      bottom: -20%;
      left: -15%;
      background: radial-gradient(circle, rgba(196,30,30,0.18) 0%, transparent 65%);
      animation: bmPulse 7s ease-in-out infinite;
      pointer-events: none;
    }

    .goodbye-container::after {
      content: '';
      position: absolute;
      width: 50vw;
      height: 50vw;
      max-width: 500px;
      max-height: 500px;
      top: -10%;
      right: -10%;
      background: radial-gradient(circle, rgba(196,30,30,0.10) 0%, transparent 60%);
      animation: bmPulse 9s ease-in-out infinite reverse;
      pointer-events: none;
    }

    @keyframes bmPulse {
      0%, 100% { transform: scale(1);    opacity: 0.9; }
      50%       { transform: scale(1.07); opacity: 1;   }
    }

    /* Sparks */
    .spark {
      position: absolute;
      bottom: -4px;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: #c41e1e;
      box-shadow: 0 0 8px 3px rgba(196,30,30,0.7);
      animation: sparkRise linear infinite;
      opacity: 0;
      pointer-events: none;
    }
    .spark--white {
      background: rgba(255,255,255,0.85);
      box-shadow: 0 0 6px 2px rgba(255,255,255,0.5);
    }
    @keyframes sparkRise {
      0%   { transform: translateY(0) scale(1);     opacity: 0; }
      5%   { opacity: 0.9; }
      80%  { opacity: 0.35; }
      100% { transform: translateY(-100vh) scale(0.1); opacity: 0; }
    }

    /* ── Card ── */
    .goodbye-content {
      background: linear-gradient(135deg,
        rgba(255,255,255,0.06) 0%,
        rgba(255,255,255,0.02) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(196,30,30,0.25);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow:
        0 0 40px rgba(196,30,30,0.15),
        0 20px 60px rgba(0,0,0,0.7),
        inset 0 1px 0 rgba(255,255,255,0.05);
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 2;
      animation: fadeInUp 0.8s ease-out;
    }

    /* Línea roja superior */
    .goodbye-content::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #c41e1e, transparent);
      border-radius: 20px 20px 0 0;
    }

    /* ── Logo ── */
    .goodbye-logo {
      width: 130px;
      height: 130px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 2rem;
      display: block;
      box-shadow:
        0 0 30px rgba(196,30,30,0.5),
        0 0 60px rgba(196,30,30,0.2);
      animation: fadeInDown 0.8s ease-out 0.2s both;
      filter: brightness(1.05) contrast(1.1);
    }

    /* ── Icon ── */
    .goodbye-icon {
      font-size: 3rem;
      color: #c41e1e;
      margin-bottom: 1.25rem;
      animation: fadeInDown 0.8s ease-out 0.3s both;
      text-shadow: 0 0 20px rgba(196,30,30,0.6);
    }

    /* ── Text ── */
    .goodbye-title {
      font-family: 'Bebas Neue', sans-serif;
      color: #fff;
      font-size: 2.8rem;
      letter-spacing: 6px;
      margin-bottom: 0.75rem;
      background: linear-gradient(135deg, #ffffff 30%, #c41e1e 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: fadeIn 0.8s ease-out 0.4s both;
    }

    .goodbye-message {
      color: rgba(255,255,255,0.6);
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.7;
      font-weight: 300;
      animation: fadeIn 0.8s ease-out 0.5s both;
    }

    /* ── Divider ── */
    .goodbye-divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(196,30,30,0.5), transparent);
      margin: 1.75rem 0;
      animation: fadeIn 0.8s ease-out 0.6s both;
    }

    /* ── Buttons ── */
    .goodbye-actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      animation: fadeInUp 0.8s ease-out 0.7s both;
    }

    .btn-goodbye {
      padding: 0.9rem 2rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      text-decoration: none;
    }

    .btn-login-again {
      background: linear-gradient(135deg, #c41e1e 0%, #8b0000 100%);
      color: #fff;
      border: none;
      box-shadow: 0 8px 25px rgba(196,30,30,0.35);
    }

    .btn-login-again:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(196,30,30,0.55);
      color: #fff;
    }

    .btn-return {
      background: transparent;
      color: #fff;
      border: 2px solid rgba(255,255,255,0.25);
    }

    .btn-return:hover {
      border-color: rgba(255,255,255,0.6);
      background: rgba(255,255,255,0.07);
      transform: translateY(-3px);
      color: #fff;
    }

    /* ── Animations ── */
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-25px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Responsive ── */
    @media (max-width: 576px) {
      .goodbye-content { padding: 2rem 1.5rem; }
      .goodbye-logo    { width: 100px; height: 100px; }
      .goodbye-title   { font-size: 2.2rem; letter-spacing: 4px; }
      .goodbye-message { font-size: 0.95rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

<body>

  <!-- Sparks -->
  <span class="spark" style="left:8%;  animation-duration:8s;  animation-delay:0s;"></span>
  <span class="spark" style="left:22%; animation-duration:12s; animation-delay:2s;"></span>
  <span class="spark" style="left:40%; animation-duration:9s;  animation-delay:4s;"></span>
  <span class="spark" style="left:60%; animation-duration:14s; animation-delay:1s;"></span>
  <span class="spark" style="left:75%; animation-duration:7s;  animation-delay:3s;"></span>
  <span class="spark" style="left:90%; animation-duration:11s; animation-delay:5s;"></span>
  <span class="spark spark--white" style="left:33%; animation-duration:10s; animation-delay:6s;"></span>
  <span class="spark spark--white" style="left:55%; animation-duration:6s;  animation-delay:2.5s;"></span>

  <div class="goodbye-container">
    <div class="goodbye-content">

      <!-- Logo -->
      <img src="../img/blind_monkey_logo.jpg" alt="Blind Monkey" class="goodbye-logo">

      <!-- Icon -->
      <div class="goodbye-icon">
        <i class="bi bi-check-circle-fill"></i>
      </div>

      <!-- Text -->
      <h1 class="goodbye-title">See You Soon</h1>
      <p class="goodbye-message">
        Your session has ended.<br>
        Thanks for managing Blind Monkey.
      </p>

      <div class="goodbye-divider"></div>

      <!-- Buttons -->
      <div class="goodbye-actions">
        <a href="../scripts/A_logon.php" class="btn-goodbye btn-login-again">
          <i class="bi bi-box-arrow-in-right"></i>
          Log in again
        </a>
        <a href="../index.php" class="btn-goodbye btn-return">
          <i class="bi bi-arrow-left"></i>
          Return to website
        </a>
      </div>

    </div>
  </div>

</body>
</html>
